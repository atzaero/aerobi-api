# Production stack: API image from GHCR + shared Postgres (hostname in DATABASE_URL, e.g. postgres on network warpgate).
# Rede `warpgate` é criada pelo Ansible / infra do servidor — external: true.
# Nginx no host faz proxy para 127.0.0.1:PORT (ver docs do ansible-vps).
#
# Usage on server:
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME}:${TAG:-latest}
    container_name: aerobi-api
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:${PORT:-3333}:3333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:'+(process.env.PORT||3333)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - warpgate

networks:
  warpgate:
    name: warpgate
    external: true
