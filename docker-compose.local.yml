# Stack local "prod-like": API a partir da imagem de PRODUÇÃO (Dockerfile, sem watch),
# consumindo a infra local compartilhada `atzaero/aerobi-local-infra` (rede `aerobi-local`).
# Suba a infra ANTES: (no aerobi-local-infra) make up
# Não usar no servidor de produção — aí use docker-compose.prod.yml (rede `warpgate`).

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aerobi-api
    ports:
      - "${PORT:-3333}:3333"
    env_file:
      - .env
    environment:
      # Hostnames internos da rede aerobi-local (não as portas host).
      DATABASE_URL: postgresql://${POSTGRES_USER:-aerobi}:${POSTGRES_PASSWORD:-aerobi}@aerobi-postgres:5432/${POSTGRES_DB:-aerobi}?schema=public
      NODE_ENV: production
      MINIO_ENDPOINT: http://aerobi-minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9002}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-aerobi-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_dev_only}
      MINIO_BUCKET: ${MINIO_BUCKET:-aerobi-dev}
      EVOLUTION_GO_BASE_URL: ${EVOLUTION_GO_BASE_URL:-http://aerobi-evolution-go:4000}
      EVOLUTION_GO_API_KEY: ${EVOLUTION_GO_API_KEY:-}
    restart: unless-stopped
    networks:
      - aerobi-local

# Rede compartilhada provida pelo aerobi-local-infra (`make up`).
networks:
  aerobi-local:
    name: aerobi-local
    external: true
