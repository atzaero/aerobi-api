# Ambiente de dev do aerobi-api.
#
# Os serviços de dado (Postgres, MinIO, Evolution GO) NÃO sobem aqui — vêm da
# infra local compartilhada `atzaero/aerobi-local-infra` (rede `aerobi-local`),
# espelhando a VPS. Suba-a ANTES:
#   git clone git@github.com:atzaero/aerobi-local-infra && cd aerobi-local-infra && make up
#
# Este compose sobe apenas a `api`, anexada à rede `aerobi-local`, falando com os
# serviços pelo hostname interno (aerobi-postgres / aerobi-minio / aerobi-evolution-go).
# As credenciais/portas devem casar com o .env do aerobi-local-infra.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aerobi-api-dev
    command: ./scripts/start-dev.sh
    # PID 1 com tini: SIGTERM chega ao Node no restart/stop (melhor que npm como PID 1).
    init: true
    stop_grace_period: 20s
    ports:
      - "${PORT:-3333}:3333"
    volumes:
      # Bind mount do código-fonte (hot reload via Webpack HMR).
      - ./:/usr/src/app
      # Anonymous volumes isolam node_modules/dist do bind mount do host:
      # preservam o que veio da imagem (npm ci) e o dist do webpack, sem deixar
      # artefatos root-owned no host nem sobrescrever deps. `down -v` recria limpo.
      - /usr/src/app/node_modules
      - /usr/src/app/dist
    env_file:
      - .env
    environment:
      # Hostnames internos da rede aerobi-local (não as portas host).
      DATABASE_URL: postgresql://${POSTGRES_USER:-aerobi}:${POSTGRES_PASSWORD:-aerobi}@aerobi-postgres:5432/${POSTGRES_DB:-aerobi}?schema=public
      NODE_ENV: development
      # Endpoint interno (rede aerobi-local) para upload/delete/download.
      MINIO_ENDPOINT: http://aerobi-minio:9000
      # Endpoint público para assinar presigned URLs (acessível pelo navegador do host).
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9002}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-aerobi-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_dev_only}
      MINIO_BUCKET_READINGS: ${MINIO_BUCKET_READINGS:-aerobi-dev-readings}
      # Evolution GO (notificações WhatsApp). EVOLUTION_GO_API_KEY = token da
      # instância (definido após linkar o número no manager :4000) — ver
      # aerobi-local-infra/README.md. Vazio = envio falha best-effort (sem linkar).
      EVOLUTION_GO_BASE_URL: ${EVOLUTION_GO_BASE_URL:-http://aerobi-evolution-go:4000}
      EVOLUTION_GO_API_KEY: ${EVOLUTION_GO_API_KEY:-}
    restart: unless-stopped
    networks:
      - aerobi-local

# Rede compartilhada provida pelo aerobi-local-infra (`make network` / `make up`).
networks:
  aerobi-local:
    name: aerobi-local
    external: true
