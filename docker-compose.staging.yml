# Staging stack: MESMA imagem GHCR da produção, co-localizada na VPS de prod.
# Só muda a env de runtime (.env.staging) e a porta de host.
#
# Porta de host (3433) vem da FONTE DA VERDADE do Ansible:
#   aerobi-ansible/inventory/prod/group_vars/all/ports.yml → app_ports.staging['aerobi-api']
#   (convenção: staging = porta de prod + 100; prod=3333 → staging=3433)
# O container escuta sempre na 3333 (PORT interno); o Nginx (vhost staging do
# Ansible) faz proxy de api.staging.aerobi.com.br → 127.0.0.1:3433.
#
# Rede `warpgate` é criada pelo Ansible / infra do servidor — external: true
# (mesma rede de prod; Postgres `aerobi_staging` está nela).
#
# Project name separado garante coexistência com prod na mesma VPS:
#   docker compose -p staging -f docker-compose.staging.yml --env-file .env.staging pull
#   docker compose -p staging -f docker-compose.staging.yml --env-file .env.staging up -d

services:
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAME}:${TAG:-latest}
    container_name: aerobi-api-staging
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    # Limites para staging não sufocar produção (compartilham a mesma VPS).
    mem_limit: 512m
    cpus: 0.5
    env_file:
      - .env.staging
    environment:
      NODE_ENV: staging
    ports:
      # host (3433, do Ansible) : container (3333, fixo)
      - "127.0.0.1:${HOST_PORT:-3433}:3333"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:'+(process.env.PORT||3333)+'/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - warpgate

networks:
  warpgate:
    name: warpgate
    external: true
