name: Release & Deploy
run-name: Release from ${{ github.ref_name }} by @${{ github.actor }}

# Fluxo único para os dois ambientes (mesma imagem GHCR, só muda a env de runtime):
#
#   push develop → semantic-release prerelease (vX.Y.Z-beta.N) → deploy STAGING
#   push main    → semantic-release estável     (vX.Y.Z)        → deploy PRODUÇÃO
#
# Sequência: release → docker (build/push GHCR) → deploy (job reutilizável
# deploy.yml, parametrizado por ambiente). O roteamento staging vs produção é
# decidido por `is_prerelease` (a versão gerada conter `-beta.N`).
#
# Secrets/variables: conexão SSH é repo-level (mesma VPS); config de aplicação
# vem do GitHub Environment ('production' / 'staging'). Detalhes e checklist:
# docs/DEPLOY_STAGING.md.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

# Serializa releases/deploys: pushes próximos em main/develop não correm em
# paralelo (evita corrida no tag do semantic-release e no `compose up` da VPS).
# cancel-in-progress: false — NÃO mata um deploy em andamento (evitaria estado
# parcial na VPS); o run seguinte aguarda e deploya o código mais novo. (#222)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Backstop: sem isto o job herda o default de 6h do GitHub. Um hang do
    # semantic-release após publicar (ex.: @semantic-release/github comentando
    # em centenas de PRs/issues num release grande) seguraria o pipeline por
    # horas e bloquearia docker/deploy (que dependem deste job).
    timeout-minutes: 15
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      is_prerelease: ${{ steps.semantic.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -o pipefail
          # `if !` isola o comando do `set -e` do runner: um CRASH do
          # semantic-release (token/rede/plugin) vira job VERMELHO com mensagem,
          # em vez de mascarado como "sem release" (o `| tee` engolia o código de
          # saída). No-release legítimo sai 0 e segue com VERSION vazio. (#166)
          # semantic-release e plugins externos não ficam em devDependencies
          # (arrastavam o pacote `npm` + undici vulnerável para o npm audit do
          # projeto). São baixados efemeramente aqui — só o job de release
          # precisa deles. changelog/git não vêm do core; github/npm/
          # commit-analyzer/release-notes-generator sim.
          if ! npx -p semantic-release -p @semantic-release/changelog -p @semantic-release/git semantic-release 2>&1 | tee release-output.log; then
            echo "::error::semantic-release falhou — abortando para não mascarar o crash como 'nenhuma versao publicada'."
            exit 1
          fi
          # Remove escapes ANSI antes de extrair (robusto a FORCE_COLOR/TTY) e
          # captura a versão COMPLETA, incluindo sufixo de prerelease (-beta.N).
          VERSION=$(sed -r 's/\x1b\[[0-9;]*[A-Za-z]//g' release-output.log \
            | grep -oP 'Published release \K[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?' \
            | head -n1 || echo "")
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> $GITHUB_OUTPUT
            echo "new_release_version=$VERSION" >> $GITHUB_OUTPUT
            # Prerelease quando a versão contém hífen (ex: 1.5.0-beta.1).
            case "$VERSION" in
              *-*) echo "is_prerelease=true"  >> $GITHUB_OUTPUT ;;
              *)   echo "is_prerelease=false" >> $GITHUB_OUTPUT ;;
            esac
            echo "Nova versao publicada: $VERSION"
          else
            echo "new_release_published=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Nenhuma versao publicada"
          fi

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new_release_version }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest` só em release estável; prerelease recebe a tag móvel `beta`
          # (beta NUNCA sobrescreve `latest`, que é o que produção segue).
          tags: |
            type=raw,value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest,enable=${{ needs.release.outputs.is_prerelease == 'false' }}
            type=raw,value=beta,enable=${{ needs.release.outputs.is_prerelease == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-production:
    name: Production
    needs: [release, docker]
    if: needs.release.outputs.new_release_published == 'true' && needs.release.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: production
      compose_file: docker-compose.prod.yml
      env_file: .env
      node_env: production
      image_tag: ${{ needs.release.outputs.new_release_version }}
      url: https://api.aerobi.com.br
      # project_name vazio = projeto default (comportamento de produção inalterado)
    secrets: inherit

  deploy-staging:
    name: Staging
    needs: [release, docker]
    if: needs.release.outputs.new_release_published == 'true' && needs.release.outputs.is_prerelease == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
      compose_file: docker-compose.staging.yml
      env_file: .env.staging
      node_env: staging
      image_tag: ${{ needs.release.outputs.new_release_version }}
      url: https://api.staging.aerobi.com.br
      project_name: aerobi-api-staging
      db_name_guard: aerobi_staging
    secrets: inherit
