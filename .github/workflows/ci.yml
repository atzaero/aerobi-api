name: CI

on:
  workflow_dispatch:
  # CI roda apenas em pull_request (o gate confiável) — push em develop dispara só
  # o release/deploy (ver AGENTS.md "Estratégia de economia de minutos do Actions";
  # paridade com aerobi/ci.yml). paths-ignore evita queimar minutos em mudanças que
  # não afetam build/test.
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '.claude/**'
      - '.mcp.json'
      - 'docs/**'

# Cancela runs supersedidos do mesmo PR quando chega um commit novo (economia de
# minutos). Restrito a pull_request: um workflow_dispatch manual NÃO é cancelado.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Production deps only (--omit=dev): avoids dev-only transitive issues (e.g. npm CLI via semantic-release).
      # Lockfile-only; fails on high+ in the install tree that ships (tighten to moderate later if desired).
      - name: Dependency audit
        run: npm run security:check

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: ESLint
        run: npm run lint:check

      - run: npm run format:check

      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: aerobi
          POSTGRES_PASSWORD: aerobi
          POSTGRES_DB: aerobi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aerobi -d aerobi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aerobi:aerobi@localhost:5432/aerobi?schema=public

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm run test
