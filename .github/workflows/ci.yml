name: CI

# =============================================================================
# TEMPORÁRIO (issue #154): triggers automáticos desativados até reabilitar
#
# Motivo: limite de minutos do GitHub Actions atingido neste ciclo de
# faturamento; mantemos o workflow disponível via `workflow_dispatch` (rodada
# manual em github.com → Actions → CI → Run workflow) para não perder a
# possibilidade de validar pontualmente.
#
# Os checks continuam sendo rodados localmente antes do commit/PR:
#   - npm run lint:check
#   - npm run format:check
#   - npm run build
#   - npm run test
#
# REVERTER quando os minutos forem renovados (próximo ciclo de billing):
# basta restaurar os triggers `push` e `pull_request` abaixo.
# =============================================================================
on:
  workflow_dispatch:
  # push:
  #   branches: [develop]
  # pull_request:
  #   branches: [main, develop]

# Nova execução na mesma ref cancela a anterior (menos fila e ruído em PRs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      # Production deps only (--omit=dev): avoids dev-only transitive issues (e.g. npm CLI via semantic-release).
      # Lockfile-only; fails on high+ in the install tree that ships (tighten to moderate later if desired).
      - name: Dependency audit
        run: npm run security:check

  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: security
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: ESLint
        run: npm run lint:check

      - run: npm run format:check

      - run: npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: aerobi
          POSTGRES_PASSWORD: aerobi
          POSTGRES_DB: aerobi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aerobi -d aerobi"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aerobi:aerobi@localhost:5432/aerobi?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy

      - run: npm run test
