name: Deploy (reusable)

# Workflow reutilizável (workflow_call) de deploy via SSH, parametrizado por
# ambiente. Usado por release.yml para produção e staging — MESMA imagem GHCR,
# só mudam os inputs e os secrets/variables do GitHub Environment.
#
# A porta de host e o diretório-alvo vêm do GitHub Environment (vars.HOST_PORT /
# vars.REMOTE_TARGET), cujos valores espelham a FONTE DA VERDADE do Ansible
# (aerobi-ansible/inventory/prod/group_vars/all/ports.yml).
#
# Secrets de conexão SSH (REMOTE_*, SSH_PRIVATE_KEY, GH_TOKEN) são repo-level
# (mesma VPS); os de aplicação (DATABASE_URL, AEROBI_API_KEY, ...) vêm do
# Environment via `secrets: inherit`.

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub Environment (production | staging)
        required: true
        type: string
      compose_file:
        description: docker-compose a usar no servidor
        required: true
        type: string
      env_file:
        description: nome do arquivo de env gerado/transferido (.env | .env.staging)
        required: true
        type: string
      node_env:
        description: valor de NODE_ENV
        required: true
        type: string
      image_tag:
        description: versão/tag da imagem GHCR (sem prefixo v)
        required: true
        type: string
      url:
        description: URL pública do ambiente (link no GitHub Environment)
        required: true
        type: string
      project_name:
        description: "docker compose -p <project> (vazio = projeto default, usado por produção)"
        required: false
        type: string
        default: ''
      db_name_guard:
        description: "se não-vazio, exige que DATABASE_URL aponte para este banco (trava anti-fallback)"
        required: false
        type: string
        default: ''

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    # Backstop: sem isto o job herda o default de 6h do GitHub e um step preso
    # (ex.: `tailscale up` aguardando login com authkey expirada — issue #225)
    # segura o runner por horas.
    timeout-minutes: 20
    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.url }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.image_tag }}

      # Trava anti-fallback (só quando db_name_guard é fornecido — ex.: staging).
      # Como staging e produção compartilham nomes de secret, um secret NÃO
      # configurado no Environment faz fallback para o repo-level (produção).
      # Validação POSITIVA por chave: DATABASE_URL deve apontar para o banco
      # esperado e CORS_ORIGINS deve conter "staging". grep -q não imprime valor.
      - name: Guard — Environment configurado
        if: inputs.db_name_guard != ''
        env:
          DB_GUARD: ${{ inputs.db_name_guard }}
          DB_URL: ${{ secrets.DATABASE_URL }}
          CORS: ${{ secrets.CORS_ORIGINS }}
          RT: ${{ vars.REMOTE_TARGET }}
          HP: ${{ vars.HOST_PORT }}
        run: |
          if [ -z "$RT" ] || [ -z "$HP" ]; then
            echo "::error::vars.REMOTE_TARGET / vars.HOST_PORT ausentes no Environment '${{ inputs.environment }}'."
            exit 1
          fi
          if ! printf '%s' "$DB_URL" | grep -qE "/${DB_GUARD}([?]|$)"; then
            echo "::error::DATABASE_URL não aponta para o banco '${DB_GUARD}' — secret do Environment provavelmente não configurado (fallback para produção). Abortando."
            exit 1
          fi
          if ! printf '%s' "$CORS" | grep -q 'staging'; then
            echo "::error::CORS_ORIGINS não contém 'staging' — secret do Environment provavelmente em fallback para produção. Abortando."
            exit 1
          fi

      # Conecta o runner à tailnet (Headscale) e resolve o host de deploy. O SSH
      # passa a sair pela interface tailscale0 → NÃO toca a porta 22 pública nem
      # o fail2ban (issue #129 do atzaero/aerobi-ansible: runner Azure com IP
      # reciclado/banido fazia o deploy falhar com 'Connection timed out').
      # Fallback: sem o secret HEADSCALE_AUTHKEY, usa o IP público (comportamento
      # anterior) — permite mergear o workflow antes de cadastrar a key.
      - name: Conectar à tailnet e resolver host de deploy
        env:
          TS_AUTHKEY: ${{ secrets.HEADSCALE_AUTHKEY }}
          PUBLIC_HOST: ${{ secrets.REMOTE_HOST }}
        run: |
          set -e
          if [ -n "$TS_AUTHKEY" ]; then
            curl -fsSL https://tailscale.com/install.sh | sh
            # `--timeout` faz o `tailscale up` ABORTAR se a authkey estiver
            # expirada/inválida ou o headscale inacessível — sem ele o comando
            # fica aguardando login interativo para sempre e o deploy pendura
            # (issue #225). O retry com backoff cobre blips transitórios do
            # headscale; se a key estiver de facto expirada/inválida, as 3
            # tentativas falham e a mensagem aponta a causa (issue #263).
            ts_ok=0
            for attempt in 1 2 3; do
              if sudo tailscale up \
                --login-server=https://headscale.aerobi.com.br \
                --authkey="$TS_AUTHKEY" \
                --hostname="gh-${{ github.event.repository.name }}-${{ github.run_id }}" \
                --accept-dns=false \
                --timeout=120s; then
                ts_ok=1
                break
              fi
              echo "::warning::Tentativa $attempt/3 de conectar à tailnet falhou; novo retry em $((attempt * 15))s."
              sleep $((attempt * 15))
            done
            if [ "$ts_ok" != "1" ]; then
              echo "::error::Falha ao conectar à tailnet após 3 tentativas. HEADSCALE_AUTHKEY provavelmente expirada/inválida ou headscale.aerobi.com.br inacessível — renove a preauthkey efêmera (docker exec headscale headscale preauthkeys create --user <ID> --reusable --ephemeral --expiration 90d --tags tag:ci) e atualize o secret (issues #225/#263)."
              exit 1
            fi
            sudo tailscale status
            echo "DEPLOY_HOST=100.64.0.1" >> "$GITHUB_ENV"
            echo "Deploy via tailnet (100.64.0.1) — SSH não toca a 22 pública."
          else
            echo "DEPLOY_HOST=$PUBLIC_HOST" >> "$GITHUB_ENV"
            echo "::warning::HEADSCALE_AUTHKEY ausente — deploy via IP público (sujeito ao fail2ban, issue #129). Cadastre o secret para usar a tailnet."
          fi

      - name: Create SSH key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts || true

      - name: Check and Create Target Directory
        env:
          RT: ${{ vars.REMOTE_TARGET }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ env.DEPLOY_HOST }} "
            if [ ! -d \"$RT\" ]; then
              mkdir -p $RT && echo 'Directory created.';
            else
              echo 'Target directory exists.';
            fi
          "

      - name: Create env file and transfer
        env:
          ENVF: ${{ inputs.env_file }}
          NODE_ENV_IN: ${{ inputs.node_env }}
          TAG_IN: ${{ inputs.image_tag }}
          HOST_PORT_IN: ${{ vars.HOST_PORT }}
          RT: ${{ vars.REMOTE_TARGET }}
          # Todos os secrets (Environment + repo-level via inherit) como JSON.
          # Lido por env (não interpolado no script) — evita injeção e vazamento.
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -e
          : > "$ENVF"
          # Valores geridos pelo workflow + conexão SSH: NÃO entram no .env da app.
          DENY="GITHUB_TOKEN GH_TOKEN SSH_PRIVATE_KEY REMOTE_HOST REMOTE_PORT REMOTE_USER REMOTE_TARGET REGISTRY IMAGE_NAME TAG NODE_ENV PORT APP_PORT HOST_PORT"
          {
            echo "REGISTRY=ghcr.io"
            echo "IMAGE_NAME=${{ github.repository }}"
            echo "TAG=$TAG_IN"
            echo "NODE_ENV=$NODE_ENV_IN"
            # PORT = porta interna do container (3333). HOST_PORT = bind de host.
            echo "PORT=3333"
            echo "HOST_PORT=$HOST_PORT_IN"
          } >> "$ENVF"
          # Todo o resto dos secrets vira config da app AUTOMATICAMENTE — sem
          # allowlist manual (não há como "esquecer" MAIL_*/JWT_*/AVIASCAN_* etc.).
          # jq escreve direto no arquivo (não no stdout) → não vaza nos logs.
          printf '%s' "$SECRETS_JSON" | jq -r --arg deny "$DENY" '
            ($deny | split(" ")) as $d
            | to_entries[]
            | select(.key as $k | ($d | index($k)) | not)
            | "\(.key)=\(.value)"
          ' >> "$ENVF"
          scp -i ~/.ssh/deploy_key -P ${{ secrets.REMOTE_PORT }} \
            "${{ inputs.compose_file }}" "$ENVF" \
            ${{ secrets.REMOTE_USER }}@${{ env.DEPLOY_HOST }}:$RT

      - name: Login to GitHub Container Registry on Remote Server
        run: |
          TOKEN="${{ secrets.GH_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "ERRO: GH_TOKEN nao disponivel"
            exit 1
          fi
          echo "$TOKEN" | ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ env.DEPLOY_HOST }} \
            "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

      - name: Ensure Docker network warpgate exists
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_USER }}@${{ env.DEPLOY_HOST }} "
            if ! docker network inspect warpgate >/dev/null 2>&1; then
              docker network create warpgate
            fi
            docker network inspect warpgate >/dev/null
          "

      - name: Deploy via SSH
        env:
          RT: ${{ vars.REMOTE_TARGET }}
          COMPOSE_FILE: ${{ inputs.compose_file }}
          ENVF: ${{ inputs.env_file }}
          PROJECT: ${{ inputs.project_name }}
          VERSION: ${{ inputs.image_tag }}
        run: |
          PF=""
          [ -n "$PROJECT" ] && PF="-p $PROJECT"
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.REMOTE_PORT }} \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=3 \
            -o ConnectTimeout=30 \
            ${{ secrets.REMOTE_USER }}@${{ env.DEPLOY_HOST }} "
            cd $RT && \
            RETRY=0
            while [ \$RETRY -lt 3 ]; do
              if docker compose $PF -f $COMPOSE_FILE --env-file $ENVF pull --quiet; then break; fi
              RETRY=\$((RETRY + 1))
              sleep 10
            done
            docker compose $PF -f $COMPOSE_FILE down --remove-orphans || true && \
            docker compose $PF -f $COMPOSE_FILE --env-file $ENVF up -d --force-recreate && \
            echo '${{ inputs.environment }} v$VERSION deployed'
          "

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          # Desconecta o nó efêmero (Headscale também o remove após inatividade).
          command -v tailscale >/dev/null 2>&1 && sudo tailscale logout || true
