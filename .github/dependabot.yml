# Dependabot — atualiza dependências npm com PRs pequenos e auditáveis.
# Complementa `npm run security:check` no CI (não substitui revisão humana).

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
